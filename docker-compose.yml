# ============================================================
# CSC5356 Final Project – Enterprise Data Lake Stack
# MinIO (3 nodes) + Iceberg + Trino + Spark + Kafka
# ============================================================

networks:
  lakehouse:
    driver: bridge

volumes:
  minio-data1:
  minio-data2:
  minio-data3:
  postgres-data:

services:

  # ----------------------------------------------------------
  # MINIO – Distributed S3-Compatible Object Storage (3 nodes)
  # ----------------------------------------------------------
  minio1:
    image: minio/minio:latest
    container_name: minio1
    hostname: minio1
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_SITE_NAME: minio-cluster
    command: server http://minio{1...3}/data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data1:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio2:
    image: minio/minio:latest
    container_name: minio2
    hostname: minio2
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_SITE_NAME: minio-cluster
    command: server http://minio{1...3}/data --console-address ":9001"
    volumes:
      - minio-data2:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio3:
    image: minio/minio:latest
    container_name: minio3
    hostname: minio3
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_SITE_NAME: minio-cluster
    command: server http://minio{1...3}/data --console-address ":9001"
    volumes:
      - minio-data3:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO client – creates buckets and policies on startup
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio1:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio1:9000 admin password123;
      mc mb --ignore-existing myminio/lakehouse;
      mc mb --ignore-existing myminio/warehouse;
      mc mb --ignore-existing myminio/checkpoints;
      mc anonymous set download myminio/lakehouse;
      echo 'MinIO buckets created';
      "
    networks:
      - lakehouse

  # ----------------------------------------------------------
  # POSTGRES – Backend for Iceberg REST Catalog
  # ----------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg_catalog
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # ICEBERG REST CATALOG
  # ----------------------------------------------------------
  iceberg-rest:
    image: tabulario/iceberg-rest:0.10.0
    container_name: iceberg-rest
    depends_on:
      postgres:
        condition: service_healthy
      minio1:
        condition: service_healthy
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio1:9000
      CATALOG_S3_ACCESS__KEY__ID: admin
      CATALOG_S3_SECRET__ACCESS__KEY: password123
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      CATALOG_S3_REGION: us-east-1
    ports:
      - "8181:8181"
    networks:
      - lakehouse

  # ----------------------------------------------------------
  # KAFKA + ZOOKEEPER
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lakehouse

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - lakehouse

  # ----------------------------------------------------------
  # TRINO – SQL Query Engine over Iceberg
  # ----------------------------------------------------------
  trino:
    image: trinodb/trino:438
    container_name: trino
    depends_on:
      - iceberg-rest
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    networks:
      - lakehouse

  # ----------------------------------------------------------
  # SPARK – Batch + Streaming Processing Engine
  # ----------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8081"
    ports:
      - "8082:8081"
      - "7077:7077"
    networks:
      - lakehouse

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_WEBUI_PORT: "8082"
    depends_on:
      - spark-master
    networks:
      - lakehouse

  # ----------------------------------------------------------
  # GRAFANA – Visualization
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - lakehouse
