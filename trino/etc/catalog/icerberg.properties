# Iceberg catalog backed by REST catalog + MinIO S3
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.file-format=PARQUET

# S3 / MinIO configuration
fs.native-s3.enabled=true
s3.endpoint=http://minio1:9000
s3.region=us-east-1
s3.aws-access-key=admin
s3.aws-secret-key=password123
s3.path-style-access=true

# Parquet read/write tuning
parquet.max-read-block-size=16MB
parquet.writer.page-size=1MB
parquet.writer.block-size=128MB
